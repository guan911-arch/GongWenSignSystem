name: Build and Package GongWenSignSystem

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore GongWenSignSystem.sln

    - name: Build
      run: dotnet build GongWenSignSystem.sln --configuration Release --no-incremental

    - name: Publish
      run: dotnet publish src/GongWenSignSystem/GongWenSignSystem.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o ./publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GongWenSignSystem-Exe
        path: ./publish
