name: Build and Package GongWenSignSystem

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Debug List Files
      run: dir /s /b

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build and Publish
      run: |
        $csproj = (Get-ChildItem -Recurse -Filter *.csproj).FullName[0]
        if (!$csproj) { echo "Project file not found"; exit 1 }
        dotnet restore $csproj
        dotnet build $csproj -c Release --no-incremental
        dotnet publish $csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o ./publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GongWenSignSystem-Exe
        path: ./publish
