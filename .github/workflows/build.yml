name: Build and Package GongWenSignSystem

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Debug: List files
      shell: pwsh
      run: |
        Write-Host "Listing all files in the repository..."
        Get-ChildItem -Recurse | Select-Object FullName

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build and Publish
      shell: pwsh
      run: |
        $csproj = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -ExpandProperty FullName -First 1
        if (-not $csproj) {
            Write-Error "No .csproj file found in the repository!"
            exit 1
        }
        Write-Host "Found project file at: $csproj"

        dotnet restore $csproj
        dotnet build $csproj --configuration Release --no-incremental
        dotnet publish $csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o ./publish
